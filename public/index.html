<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT App - Central de Pendências</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="app-container">
        <!-- Top Header / Date Area -->
        <header class="main-header glass-panel">
            <div class="header-logo">
                <span class="logo-badge">GT</span>
                <h1>GT App</h1>
            </div>
            
            <!-- Date Display (In Foreground) -->
            <div class="date-hero">
                <div class="date-day-name" id="current-day-name">Carregando...</div>
                <div class="date-full" id="current-date-full">--/--/----</div>
            </div>
            
            <div class="header-actions">
                <button id="btn-mobile-link" class="btn btn-secondary mobile-access-btn" title="Acessar no celular">
                    <i class="fa-solid fa-mobile-screen-button"></i>
                    <span>Celular</span>
                    <div class="mobile-popover glass-panel hidden" id="mobile-popover">
                        <h4>Acessar no Smartphone</h4>
                        <p>Escaneie o QR Code ou digite a URL (conecte no mesmo Wi-Fi):</p>
                        <div class="qr-container" id="qr-container"></div>
                        <input type="text" id="mobile-url-input" readonly value="Carregando..." onclick="this.select()">
                    </div>
                </button>
                <button id="btn-open-register-user" class="btn btn-primary" title="Cadastrar novo usuário">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>Cadastrar Usuário</span>
                </button>
            </div>
        </header>

        <!-- Notification Toast -->
        <div id="toast" class="toast hidden">
            <span id="toast-message">Mensagem</span>
        </div>

        <!-- View Selection Tabs -->
        <div class="view-selector">
            <button class="view-tab-btn active" data-view="tasks">
                <i class="fa-solid fa-list-check"></i>
                <span>Pendências</span>
            </button>
            <button class="view-tab-btn" data-view="dashboard">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Dashboard</span>
            </button>
            <a href="https://docs.google.com/spreadsheets/d/1aAsiicOY0vu5MgQjeeBCsqcAZwGn3JQmj8drYrVaZtc/edit?gid=0#gid=0" target="_blank" rel="noopener noreferrer" class="view-tab-btn shortcut-btn" title="Abrir planilha de Aviamentos">
                <i class="fa-solid fa-scissors"></i>
                <span>Aviamentos</span>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1j7k8WWvE9m4YZrw7qadANIcx_XtOzAlwYfWnm0AC5sA/edit?gid=722944309#gid=722944309" target="_blank" rel="noopener noreferrer" class="view-tab-btn shortcut-btn" title="Abrir planilha de Cores">
                <i class="fa-solid fa-palette"></i>
                <span>Cores</span>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1uQGFBQjMI4Gnyq8eIMxRqFArmr00bEazGQVrHRD9vlY/edit?gid=0#gid=0" target="_blank" rel="noopener noreferrer" class="view-tab-btn shortcut-btn" title="Abrir planilha de Rotativos">
                <i class="fa-solid fa-arrows-spin"></i>
                <span>Rotativos</span>
            </a>
        </div>

        <!-- View: Tasks Board -->
        <div id="tasks-view">
            <!-- Filter & Search Controls -->
            <section class="controls-panel glass-panel">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="Pesquisar pendências...">
                </div>
                <div class="status-filters">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="pending">Pendentes</button>
                    <button class="filter-btn" data-filter="completed">Concluídas</button>
                </div>
            </section>

            <!-- Main Workspace (Dynamic Grid for Registered Users) -->
            <main class="lists-grid" id="users-columns-grid">
                <div class="loader-inner" style="grid-column: 1 / -1;">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <span style="margin-left: 10px;">Carregando painel...</span>
                </div>
            </main>
        </div>

        <!-- View: Dashboard -->
        <div id="dashboard-view" class="dashboard-view hidden">
            <!-- Global Stats Summary -->
            <div class="dashboard-stats-summary" id="dashboard-stats-summary">
                <!-- Dynamically loaded -->
            </div>
            
            <!-- Users Summary Grid -->
            <div class="dashboard-users-grid" id="dashboard-users-grid">
                <!-- Dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Modal: Register User -->
    <div id="modal-register-user" class="modal-backdrop hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="user-modal-title"><i class="fa-solid fa-user-plus"></i> Cadastrar Novo Usuário</h3>
                <button class="btn-close-modal" onclick="closeModal('modal-register-user')">&times;</button>
            </div>
            <form id="form-register-user" class="modal-form">
                <div class="form-group">
                    <label for="reg-name">Nome</label>
                    <input type="text" id="reg-name" placeholder="Ex: Lucas" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="Ex: lucas@confeccoesoneda.com.br" required autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger hidden" id="btn-delete-user" onclick="handleDeleteUser()" style="background: rgba(244, 67, 54, 0.15); border: 1px solid rgba(244, 67, 54, 0.3); color: #ff5252; margin-right: auto; font-weight: 600;">Excluir Usuário</button>
                    <button type="button" class="btn btn-secondary" id="btn-cancel-user-modal" onclick="closeModal('modal-register-user')">Cancelar</button>
                    <button type="button" class="btn btn-secondary hidden" id="btn-cancel-edit-user" onclick="cancelEditUser()">Cancelar Edição</button>
                    <button type="submit" class="btn btn-submit" id="btn-submit-user">Cadastrar</button>
                </div>
            </form>
            
            <div class="registered-users-section">
                <h4>Usuários Cadastrados</h4>
                <div class="users-mini-list" id="users-mini-list">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Add Task -->
    <div id="modal-add-task" class="modal-backdrop hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3><i class="fa-solid fa-circle-plus"></i> Nova Pendência (<span id="add-task-owner-name">Usuário</span>)</h3>
                <button class="btn-close-modal" onclick="closeModal('modal-add-task')">&times;</button>
            </div>
            <form id="form-add-task" class="modal-form">
                <input type="hidden" id="add-task-owner-id">
                <div class="form-group">
                    <label for="task-text">Descrição da Pendência</label>
                    <input type="text" id="task-text" placeholder="O que precisa ser feito?" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="task-obs">Observação / Comentário Inicial (Opcional)</label>
                    <textarea id="task-obs" placeholder="Algum detalhe relevante..." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="task-classification">Classificação</label>
                    <select id="task-classification">
                        <option value="">Nenhuma</option>
                        <option value="urgente">Urgente (Vermelho)</option>
                        <option value="semanal">Semanal (Amarelo)</option>
                        <option value="mensal">Mensal (Azul)</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modal-add-task')">Cancelar</button>
                    <button type="submit" class="btn btn-submit">Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: View / Upload Image -->
    <div id="modal-task-image" class="modal-backdrop hidden">
        <div class="modal-content glass-panel" style="max-width: 500px;">
            <div class="modal-header">
                <h3><i class="fa-solid fa-image"></i> Imagem Anexa</h3>
                <button class="btn-close-modal" onclick="closeModal('modal-task-image')">&times;</button>
            </div>
            
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; padding: 20px 0;">
                <!-- Preview / Image display -->
                <div id="task-image-preview-container" class="hidden" style="width: 100%; text-align: center; position: relative;">
                    <img id="task-image-preview" src="" alt="Anexo" style="max-width: 100%; max-height: 350px; border-radius: 12px; border: 1px solid var(--border-color); object-fit: contain;">
                </div>
                
                <!-- Upload dropzone/button -->
                <div id="task-image-upload-container" class="task-image-dropzone" onclick="triggerImageFileInput()" style="width: 100%; border: 2px dashed var(--border-color); border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s ease;">
                    <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 12px;"></i>
                    <p style="font-size: 0.95rem; color: var(--text-muted); margin: 0;">Arraste uma imagem ou clique para selecionar</p>
                    <span style="font-size: 0.8rem; color: var(--text-muted); opacity: 0.7;">Formatos aceitos: JPG, PNG, GIF, WEBP</span>
                </div>
                
                <!-- Hidden File Input -->
                <input type="file" id="task-image-file-input" accept="image/*" class="hidden" onchange="handleImageFileSelected(this)">
                
                <input type="hidden" id="task-image-person">
                <input type="hidden" id="task-image-row">
                <input type="hidden" id="task-image-text">
            </div>
            
            <div class="modal-actions" style="width: 100%; display: flex; justify-content: space-between; gap: 12px;">
                <button id="btn-delete-task-image" class="btn btn-secondary hidden" onclick="deleteTaskImage()" style="background: rgba(220, 53, 69, 0.1); border-color: rgba(220, 53, 69, 0.2); color: #ff5f70;" title="Excluir imagem">
                    <i class="fa-solid fa-trash-can"></i> Excluir
                </button>
                <div style="display: flex; gap: 12px; margin-left: auto;">
                    <button id="btn-replace-task-image" class="btn btn-secondary hidden" onclick="triggerImageFileInput()">
                        <i class="fa-solid fa-arrows-rotate"></i> Substituir
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modal-task-image')">Fechar</button>
                    <button id="btn-save-task-image" class="btn btn-submit hidden" onclick="saveTaskImage()">Salvar Imagem</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
